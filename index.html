<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEAR MAGAZINE — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@200;300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      color: #f5f0eb;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* subtle animated gradient background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(180,140,100,.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(120,100,140,.10) 0%, transparent 60%);
      animation: shimmer 8s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0%   { opacity: .6; }
      100% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      animation: fadeUp 1.2s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.6rem;
      font-weight: 600;
      letter-spacing: .12em;
      margin-bottom: .6rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(245,240,235,.3);
      margin: 1.4rem auto;
    }

    .label {
      font-family: 'Outfit', sans-serif;
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(245,240,235,.45);
      margin-bottom: 1.8rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      line-height: 1.5;
      margin-bottom: 1.2rem;
    }

    p {
      font-weight: 200;
      font-size: .95rem;
      line-height: 1.8;
      color: rgba(245,240,235,.65);
      margin-bottom: 2.4rem;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(245,240,235,.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2.4rem;
    }

    .progress-bar .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #c9a96e, #e8d5b7);
      animation: load 2s .8s ease-out forwards;
    }

    @keyframes load {
      to { width: 65%; }
    }

    .contact {
      font-size: .8rem;
      color: rgba(245,240,235,.35);
      letter-spacing: .05em;
    }

    .contact a {
      color: #c9a96e;
      text-decoration: none;
      border-bottom: 1px solid rgba(201,169,110,.3);
      transition: border-color .3s;
    }

    .contact a:hover {
      border-color: #c9a96e;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .container {
        padding: 1.4rem 1.2rem;
        max-width: 100%;
      }

      .logo {
        font-size: 1.6rem;
        letter-spacing: .06em;
        margin-bottom: .3rem;
      }

      .divider {
        width: 40px;
        margin: 1rem auto;
      }

      .label {
        font-size: .65rem;
        letter-spacing: .08em;
        margin-bottom: 1.4rem;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: .8rem;
      }

      p {
        font-size: .85rem;
        line-height: 1.7;
        margin-bottom: 1.8rem;
      }

      .progress-bar {
        margin-bottom: 1.8rem;
      }

      .contact {
        font-size: .7rem;
      }
    }

    /* ── Small mobile ── */
    @media (max-width: 360px) {
      .logo {
        font-size: 1.3rem;
        letter-spacing: .04em;
      }

      h1 {
        font-size: .9rem;
      }

      p {
        font-size: .78rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">GEAR<br>MAGAZINE</div>
    <div class="logo">.</div>
    <div class="logo">LOADING</div>

    <div class="progress-bar"><div class="fill"></div></div>
  </div>

</body>
</html>
