<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEAR MAGAZINE — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      color: #f5f0eb;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* subtle animated gradient background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(180,140,100,.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(120,100,140,.10) 0%, transparent 60%);
      animation: shimmer 8s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0%   { opacity: .6; }
      100% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      animation: fadeUp 1.2s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: .15em;
      margin-bottom: .6rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(245,240,235,.3);
      margin: 1.4rem auto;
    }

    .label {
      font-size: .75rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(245,240,235,.45);
      margin-bottom: 1.8rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 1.2rem;
    }

    p {
      font-weight: 300;
      font-size: .95rem;
      line-height: 1.8;
      color: rgba(245,240,235,.65);
      margin-bottom: 2.4rem;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(245,240,235,.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2.4rem;
    }

    .progress-bar .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #c9a96e, #e8d5b7);
      animation: load 2s .8s ease-out forwards;
    }

    @keyframes load {
      to { width: 65%; }
    }

    .contact {
      font-size: .8rem;
      color: rgba(245,240,235,.35);
      letter-spacing: .05em;
    }

    .contact a {
      color: #c9a96e;
      text-decoration: none;
      border-bottom: 1px solid rgba(201,169,110,.3);
      transition: border-color .3s;
    }

    .contact a:hover {
      border-color: #c9a96e;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">GEAR MAGAZINE</div>
    <div class="label">Loading</div>
    <div class="divider"></div>

    <h1>새로운 모습으로<br>돌아오겠습니다</h1>

    <p>
      현재 더 나은 경험을 위해 사이트를 리뉴얼하고 있습니다.<br>
      이용에 불편을 드려 진심으로 죄송합니다.<br>
      곧 새로운 모습으로 찾아뵙겠습니다.
    </p>

    <div class="progress-bar"><div class="fill"></div></div>
  </div>

</body>
</html>
